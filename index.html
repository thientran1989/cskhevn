<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSKH EVN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Logo & Header -->
        <div class="header-section">
            <img 
                src="https://play-lh.googleusercontent.com/evGmYOBR-G6zzS9dHu4PfgXLPBndHo-7oyvP1pPjET1PFCz07YxpSiwvqqm-4OSs64YG9iTm8VjawtzEFLj8i20=w240-h480-rw" 
                class="logo" 
                alt="CSKH EVN"
                onerror="this.src='images/logo.png';"
            >
            <h1>CSKH EVN</h1>
            <p class="subtitle">Ứng dụng Chăm sóc khách hàng</p>
        </div>

        <!-- Trạng thái -->
        <div class="status-section">
            <div class="loader"></div>
            <div id="status">Đang nhận diện thiết bị...</div>
        </div>

        <!-- Khu vực thông báo nhãn thiết bị -->
<div id="device-label" style="text-align: center; font-weight: bold; margin-bottom: 15px; color: #333;"></div>

<!-- Khu vực tải App -->
<div id="manual">
    <!-- Box Android -->
    <div id="boxAndroid" class="box">
        <h2>Android</h2>
        <div class="qr-wrapper">
            <div id="qrAndroid"></div>
        </div>
        <a id="androidBtn" class="btn android" href="https://play.google.com/store/apps/details?id=YOUR_ANDROID_APP_ID">
            Tải trên Google Play
        </a>
    </div>

    <!-- Box iOS -->
    <div id="boxIOS" class="box">
        <h2>iPhone (iOS)</h2>
        <div class="qr-wrapper">
            <div id="qrIOS"></div>
        </div>
        <a id="iosBtn" class="btn ios" href="https://apps.apple.com/vn/app/YOUR_IOS_APP_ID">
            Tải trên App Store
        </a>
    </div>
</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
