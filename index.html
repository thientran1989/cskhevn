<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSKH EVN</title>
    <link rel="stylesheet" href="style.css">
    <!-- Nhúng thư viện tạo mã QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Logo & Header -->
        <div class="header-section">
            <img 
                src="https://play-lh.googleusercontent.com/evGmYOBR-G6zzS9dHu4PfgXLPBndHo-7oyvP1pPjET1PFCz07YxpSiwvqqm-4OSs64YG9iTm8VjawtzEFLj8i20=w240-h480-rw" 
                class="logo" 
                alt="CSKH EVN"
                onerror="this.src='images/logo.png';"
            >
            <h1>CSKH EVN</h1>
            <p class="subtitle">Ứng dụng Chăm sóc khách hàng</p>
        </div>

        <!-- Vùng Trạng thái (Sẽ bị ẩn đi khi nhận diện xong) -->
        <div class="status-section">
            <div class="loader"></div>
            <div id="status">Đang nhận diện thiết bị...</div>
        </div>

        <!-- Vùng hiển thị tên Hệ điều hành (Mặc định ẩn, JS nhận diện xong sẽ hiện) -->
        <div id="device-label" style="text-align: center; font-weight: bold; margin-bottom: 15px; color: #0056B3; display: none;"></div>

        <!-- Khu vực tải App -->
        <div id="manual">
            <!-- Box Android (Thêm id="boxAndroid") -->
            <div class="box" id="boxAndroid">
                <h2>Android</h2>
                <div class="qr-wrapper">
                    <div id="qrAndroid"></div>
                </div>
                <a id="androidBtn" class="btn android" href="#">
                    Tải trên Google Play
                </a>
            </div>

            <!-- Box iOS (Thêm id="boxIOS") -->
            <div class="box" id="boxIOS">
                <h2>iPhone (iOS)</h2>
                <div class="qr-wrapper">
                    <div id="qrIOS"></div>
                </div>
                <a id="iosBtn" class="btn ios" href="#">
                    Tải trên App Store
                </a>
            </div>
        </div>
    </div>
</div>

<!-- ================= NHÚNG JS THẲNG VÀO ĐÂY ================= -->
<script>
// 1. Khai báo URL ứng dụng
const androidUrl = "https://play.google.com/store/apps/details?id=com.evn.cskh.vn";
const iosUrl = "https://apps.apple.com/vn/app/evn-cskh/id6754793134";

// 2. Chèn url vào nút bấm
document.getElementById("androidBtn").href = androidUrl;
document.getElementById("iosBtn").href = iosUrl;

// 3. Tạo mã QR
new QRCode("qrAndroid", { text: androidUrl, width: 170, height: 170 });
new QRCode("qrIOS", { text: iosUrl, width: 170, height: 170 });

// 4. Nhận diện thiết bị & Xử lý giao diện
const ua = navigator.userAgent;
const statusSection = document.querySelector(".status-section");
const deviceLabel = document.getElementById("device-label");
const boxAndroid = document.getElementById("boxAndroid");
const boxIOS = document.getElementById("boxIOS");

let targetUrl = null;
let osLabel = "";

if (/android/i.test(ua)) {
    osLabel = "Bạn đang dùng hệ điều hành: Android";
    if (boxIOS) boxIOS.style.display = "none"; // Ẩn iOS đi
    targetUrl = androidUrl;
} else if (/iPhone|iPad|iPod/i.test(ua)) {
    osLabel = "Bạn đang dùng hệ điều hành: iPhone / iPad (iOS)";
    if (boxAndroid) boxAndroid.style.display = "none"; // Ẩn Android đi
    targetUrl = iosUrl;
} else {
    osLabel = "Bạn đang dùng thiết bị: Máy tính hoặc Hệ điều hành khác";
    // Thiết bị lạ thì hiện sẵn cả 2 box để quét luôn
    document.getElementById("manual").style.display = "block";
}

// Ẩn vùng "Đang nhận diện..." và hiện nhãn thiết bị lên
if (statusSection) statusSection.style.display = "none";
if (deviceLabel) {
    deviceLabel.innerText = osLabel;
    deviceLabel.style.display = "block"; 
}

// 5. Sau 0.8 giây: Thử chuyển hướng tự động
setTimeout(() => {
    if (targetUrl) {
        window.location.href = targetUrl;
    }
}, 800);

// 6. Kế hoạch dự phòng: Sau 3 giây nếu không chuyển hướng được thì bung lại tất cả QR
setTimeout(() => {
    if (deviceLabel) {
        deviceLabel.innerHTML = `${osLabel}<br><span style="color: #d9534f; font-size: 14px; font-weight: normal;">Không thể tự động chuyển hướng. Vui lòng chọn hoặc quét mã QR bên dưới:</span>`;
    }
    document.getElementById("manual").style.display = "block";
    if (boxAndroid) boxAndroid.style.display = "block";
    if (boxIOS) boxIOS.style.display = "block";
}, 3000);
</script>
</body>
</html>
